name = "uk-aq-latest-snapshot-r2-api"
main = "worker.mjs"
compatibility_date = "2026-03-11"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[vars]
UK_AQ_LATEST_SNAPSHOT_R2_PREFIX = "latest_snapshots/v1"
UK_AQ_LATEST_SNAPSHOT_MANIFEST_KEY = "latest_snapshots/v1/manifest.json"
UK_AQ_LATEST_SNAPSHOT_R2_CACHE_MAX_AGE_SECONDS = "60"

[[r2_buckets]]
binding = "UK_AQ_HISTORY_BUCKET"
bucket_name = "__CFLARE_R2_BUCKET__"
preview_bucket_name = "__CFLARE_R2_BUCKET__"
