name = "uk-aq-cache-proxy"
main = "src/index.ts"
compatibility_date = "2026-02-22"

[observability]
enabled = true

# Runtime secrets expected:
# - SUPABASE_URL
# - SB_PUBLISHABLE_DEFAULT_KEY
# - UK_AQ_CACHE_ALLOWED_ORIGINS
# - UK_AQ_EDGE_ACCESS_TOKEN_SECRET
# - UK_AQ_EDGE_UPSTREAM_SECRET
# - UK_AQ_CACHE_BYPASS_SECRET
# - UK_AQ_TURNSTILE_SECRET_KEY
# Runtime variables:
# - UK_AQ_EDGE_SESSION_MAX_AGE_SECONDS (optional)
#
# Route binding is configured in Cloudflare dashboard or via wrangler CLI.
# Recommended hostnames:
# - uk-aq-cache-cic-test.chronicillnesschannel.co.uk
# - uk-aq-cache.chronicillnesschannel.co.uk
