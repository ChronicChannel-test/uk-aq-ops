name: Deploy uk_aq_aqi_history_r2_test Worker

on:
  push:
    branches:
      - main
    paths:
      - "workers/uk_aq_aqi_history_r2_test_worker/**"
      - ".github/workflows/uk_aq_aqi_history_r2_test_worker_deploy.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Set Worker secrets
        working-directory: workers/uk_aq_aqi_history_r2_test_worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          secrets_json="$(jq -n \
            --arg AGGDAILY_SUPABASE_URL "${{ vars.AGGDAILY_SUPABASE_URL }}" \
            --arg AGGDAILY_SECRET_KEY "${{ secrets.AGGDAILY_SECRET_KEY }}" \
            '{AGGDAILY_SUPABASE_URL: $AGGDAILY_SUPABASE_URL, AGGDAILY_SECRET_KEY: $AGGDAILY_SECRET_KEY} | with_entries(select(.value != ""))')"
          if [ "$(printf '%s' "$secrets_json" | jq 'length')" -gt 0 ]; then
            printf "%s" "$secrets_json" | npx --yes wrangler@4 secret bulk --name uk-aq-aqi-history-r2-test
          else
            echo "No Worker secrets to set."
          fi

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/uk_aq_aqi_history_r2_test_worker
          command: deploy
