name: UK AQ Dropbox Prune Raw Data

on:
  # Intended external schedule:
  #   05:49 UTC daily via Cloudflare Worker
  # Previous GitHub cron:
  #   schedule:
  #     - cron: "49 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: uk-aq-dropbox-prune-raw
  cancel-in-progress: false

jobs:
  prune-dropbox-raw-data:
    runs-on: ubuntu-latest
    env:
      DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
      DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
      DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
      UK_AQ_DROPBOX_ROOT: ${{ vars.UK_AQ_DROPBOX_ROOT || '' }}
      DROPBOX_RAWFILES_KEEP: ${{ vars.DROPBOX_RAWFILES_KEEP || '32' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for daily task health reporting
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Report daily task health (started)
        id: daily_task_health_started
        env:
          SUPABASE_URL: ${{ vars.OBS_AQIDB_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.OBS_AQIDB_SECRET_KEY }}
          DAILY_TASK_KEY: ops.dropbox_prune_raw
          DAILY_TASK_HEALTH_REPORT_STAGE: started
        run: node scripts/report_daily_task_health.mjs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Prune old raw Dropbox folders
        run: |
          python3 scripts/uk_aq_dropbox_prune_raw.py

      - name: Report daily task health
        if: always()
        env:
          SUPABASE_URL: ${{ vars.OBS_AQIDB_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.OBS_AQIDB_SECRET_KEY }}
          DAILY_TASK_KEY: ops.dropbox_prune_raw
          DAILY_TASK_HEALTH_REPORT_STAGE: final
          DAILY_TASK_HEALTH_RUN_ID: ${{ steps.daily_task_health_started.outputs.health_run_id }}
          JOB_STATUS: ${{ job.status }}
        run: node scripts/report_daily_task_health.mjs
