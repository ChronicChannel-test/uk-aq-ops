name: UK AQ Dropbox Prune Raw Data

on:
  schedule:
    - cron: "49 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prune-dropbox-raw-data:
    runs-on: ubuntu-latest
    env:
      DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
      DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
      DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
      UK_AQ_DROPBOX_ROOT: ${{ vars.UK_AQ_DROPBOX_ROOT || '' }}
      DROPBOX_RAWFILES_KEEP: ${{ vars.DROPBOX_RAWFILES_KEEP || '32' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Prune old raw Dropbox folders
        run: |
          python3 scripts/uk_aq_dropbox_prune_raw.py
