name: UK AQ R2 History Restore From Dropbox

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing to R2"
        required: false
        default: true
        type: boolean
      day_utc:
        description: "Optional single day filter (YYYY-MM-DD). Blank = all available days."
        required: false
        default: ""
        type: string
      restore_observations:
        description: "Restore observations domain"
        required: false
        default: true
        type: boolean
      restore_aqilevels:
        description: "Restore aqilevels domain"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: uk-aq-r2-history-restore-from-dropbox
  cancel-in-progress: false

jobs:
  restore-r2-history-from-dropbox:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CFLARE_R2_ENDPOINT: ${{ vars.CFLARE_R2_ENDPOINT || '' }}
      CFLARE_R2_BUCKET: ${{ vars.CFLARE_R2_BUCKET || '' }}
      CFLARE_R2_REGION: ${{ vars.CFLARE_R2_REGION || 'auto' }}
      CFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CFLARE_R2_ACCESS_KEY_ID }}
      CFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CFLARE_R2_SECRET_ACCESS_KEY }}

      DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
      DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
      DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}

      UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX || 'history/v1/observations' }}
      UK_AQ_R2_HISTORY_AQILEVELS_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_AQILEVELS_PREFIX || 'history/v1/aqilevels' }}
      UK_AQ_DROPBOX_ROOT: ${{ vars.UK_AQ_DROPBOX_ROOT || 'CIC-Test' }}
      UK_AQ_R2_HISTORY_DROPBOX_DIR: ${{ vars.UK_AQ_R2_HISTORY_DROPBOX_DIR || 'R2_history_backup' }}

      INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
      INPUT_DAY_UTC: ${{ github.event.inputs.day_utc || '' }}
      INPUT_RESTORE_OBSERVATIONS: ${{ github.event.inputs.restore_observations || 'true' }}
      INPUT_RESTORE_AQILEVELS: ${{ github.event.inputs.restore_aqilevels || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Validate required configuration
        run: |
          set -euo pipefail
          required_vars=(
            CFLARE_R2_ENDPOINT
            CFLARE_R2_BUCKET
            CFLARE_R2_ACCESS_KEY_ID
            CFLARE_R2_SECRET_ACCESS_KEY
            DROPBOX_APP_KEY
            DROPBOX_APP_SECRET
            DROPBOX_REFRESH_TOKEN
            UK_AQ_DROPBOX_ROOT
            UK_AQ_R2_HISTORY_DROPBOX_DIR
          )

          missing=0
          for key in "${required_vars[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required value: ${key}" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          if [ "${INPUT_RESTORE_OBSERVATIONS}" != "true" ] && [ "${INPUT_RESTORE_AQILEVELS}" != "true" ]; then
            echo "At least one domain must be selected." >&2
            exit 1
          fi

          day_utc="$(printf "%s" "${INPUT_DAY_UTC}" | tr -d '\r\n' | xargs)"
          if printf "%s" "${day_utc}" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}[T ].*$'; then
            day_utc="${day_utc:0:10}"
          fi
          case "${day_utc}" in
            ""|"null"|"NULL"|"none"|"NONE"|"all"|"ALL"|"\"\""|"''")
              day_utc=""
              ;;
          esac
          if [ -n "${day_utc}" ] && ! printf "%s" "${day_utc}" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "day_utc must be YYYY-MM-DD when provided." >&2
            exit 1
          fi
          echo "NORMALIZED_DAY_UTC=${day_utc}" >> "$GITHUB_ENV"

      - name: Configure rclone remotes
        env:
          RCLONE_CONFIG: ${{ runner.temp }}/rclone.conf
        run: |
          set -euo pipefail

          endpoint="${CFLARE_R2_ENDPOINT%/}"
          dropbox_access_token="$(curl -fsS https://api.dropbox.com/oauth2/token \
            -u "${DROPBOX_APP_KEY}:${DROPBOX_APP_SECRET}" \
            -d grant_type=refresh_token \
            --data-urlencode "refresh_token=${DROPBOX_REFRESH_TOKEN}" \
            | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data.get("access_token",""))')"

          if [ -z "${dropbox_access_token}" ]; then
            echo "Failed to fetch Dropbox access token from refresh token" >&2
            exit 1
          fi

          dropbox_token="$(DROPBOX_ACCESS_TOKEN="${dropbox_access_token}" DROPBOX_REFRESH_TOKEN="${DROPBOX_REFRESH_TOKEN}" python3 -c 'import json, os; print(json.dumps({"access_token": os.environ["DROPBOX_ACCESS_TOKEN"], "token_type": "bearer", "refresh_token": os.environ["DROPBOX_REFRESH_TOKEN"], "expiry": "0001-01-01T00:00:00Z"}, separators=(",", ":")))')"

          mkdir -p "$(dirname "${RCLONE_CONFIG}")"
          {
            echo "[uk_aq_r2]"
            echo "type = s3"
            echo "provider = Cloudflare"
            echo "env_auth = false"
            echo "access_key_id = ${CFLARE_R2_ACCESS_KEY_ID}"
            echo "secret_access_key = ${CFLARE_R2_SECRET_ACCESS_KEY}"
            echo "endpoint = ${endpoint}"
            echo "region = ${CFLARE_R2_REGION}"
            echo "acl = private"
            echo "no_check_bucket = true"
            echo
            echo "[uk_aq_dropbox]"
            echo "type = dropbox"
            echo "client_id = ${DROPBOX_APP_KEY}"
            echo "client_secret = ${DROPBOX_APP_SECRET}"
            echo "token = ${dropbox_token}"
          } > "${RCLONE_CONFIG}"

          chmod 600 "${RCLONE_CONFIG}"
          echo "RCLONE_CONFIG=${RCLONE_CONFIG}" >> "$GITHUB_ENV"

      - name: Restore from Dropbox to R2
        run: |
          set -euo pipefail
          mkdir -p tmp

          dropbox_root="${UK_AQ_DROPBOX_ROOT%/}"
          dropbox_root="${dropbox_root#/}"
          dropbox_dir="${UK_AQ_R2_HISTORY_DROPBOX_DIR#/}"
          dropbox_dir="${dropbox_dir%/}"

          if [ -n "${dropbox_root}" ]; then
            dropbox_backup_root="${dropbox_root}/${dropbox_dir}"
          else
            dropbox_backup_root="${dropbox_dir}"
          fi

          cmd=(
            node scripts/backup_r2/restore_history_from_dropbox.mjs
            --source-root "uk_aq_dropbox:${dropbox_backup_root}"
            --dest-root "uk_aq_r2:${CFLARE_R2_BUCKET}"
            --report-out "tmp/r2_history_restore_from_dropbox_report.json"
          )

          if [ "${INPUT_RESTORE_OBSERVATIONS}" = "true" ]; then
            cmd+=(--domain observations)
          fi
          if [ "${INPUT_RESTORE_AQILEVELS}" = "true" ]; then
            cmd+=(--domain aqilevels)
          fi

          day_utc="${NORMALIZED_DAY_UTC:-}"
          if [ -n "${day_utc}" ]; then
            cmd+=(--day-utc "${day_utc}")
          fi

          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            cmd+=(--dry-run)
          fi

          echo "Running: ${cmd[*]}"
          "${cmd[@]}"

      - name: Upload restore report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uk-aq-r2-history-restore-from-dropbox-report
          path: tmp/r2_history_restore_from_dropbox_report.json
          if-no-files-found: ignore
