name: CodeQL-NoArchive

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/codeql/**"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
      - "**/*.cjs"
      - "**/*.py"
      - "**/*.yml"
      - "**/*.yaml"
      - "requirements*.txt"
      - "pyproject.toml"
      - "poetry.lock"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - "tsconfig*.json"
      - "!archive/**"
      - "!data/**"
      - "!logs/**"
      - "!issue_reports/**"
      - "!network_info/**"
      - "!**/*.md"
      - "!**/*.png"
      - "!**/*.jpg"
      - "!**/*.jpeg"
      - "!**/*.gif"
      - "!**/*.webp"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/codeql/**"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
      - "**/*.cjs"
      - "**/*.py"
      - "**/*.yml"
      - "**/*.yaml"
      - "requirements*.txt"
      - "pyproject.toml"
      - "poetry.lock"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - "tsconfig*.json"
      - "!archive/**"
      - "!data/**"
      - "!logs/**"
      - "!issue_reports/**"
      - "!network_info/**"
      - "!**/*.md"
      - "!**/*.png"
      - "!**/*.jpg"
      - "!**/*.jpeg"
      - "!**/*.gif"
      - "!**/*.webp"
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - actions
          - javascript-typescript
          - python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
