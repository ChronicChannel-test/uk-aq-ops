name: Deploy uk_aq_workflow_scheduler Worker

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    env:
      UK_AQ_WORKFLOW_SCHEDULER_WORKER_NAME: ${{ vars.UK_AQ_WORKFLOW_SCHEDULER_WORKER_NAME || 'uk-aq-workflow-scheduler' }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || '' }}
      UK_AQ_WORKFLOW_SCHEDULER_GITHUB_DISPATCH_TOKEN: ${{ secrets.UK_AQ_WORKFLOW_SCHEDULER_GITHUB_DISPATCH_TOKEN || '' }}
      UK_AQ_WORKFLOW_SCHEDULER_MANUAL_TRIGGER_KEY: ${{ secrets.UK_AQ_WORKFLOW_SCHEDULER_MANUAL_TRIGGER_KEY || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cloudflare credentials and scheduler token
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing secret CLOUDFLARE_API_TOKEN."
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing secret CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi
          if [ -z "${UK_AQ_WORKFLOW_SCHEDULER_GITHUB_DISPATCH_TOKEN}" ]; then
            echo "Missing secret UK_AQ_WORKFLOW_SCHEDULER_GITHUB_DISPATCH_TOKEN."
            exit 1
          fi

      - name: Prepare scheduler config
        run: |
          set -euo pipefail
          if [ -z "${GITHUB_REPOSITORY_OWNER:-}" ]; then
            echo "Missing GITHUB_REPOSITORY_OWNER from GitHub Actions context."
            exit 1
          fi
          sed -i "s/YOUR_GITHUB_OWNER/${GITHUB_REPOSITORY_OWNER}/g" cloudflare/workflow-scheduler/worker.js
          if [ ! -f cloudflare/workflow-scheduler/wrangler.toml ]; then
            echo "Missing cloudflare/workflow-scheduler/wrangler.toml."
            exit 1
          fi
          sed -i "s/^name = .*/name = \"${UK_AQ_WORKFLOW_SCHEDULER_WORKER_NAME}\"/" cloudflare/workflow-scheduler/wrangler.toml

      - name: Validate scheduler cron alignment
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          worker_text = Path("cloudflare/workflow-scheduler/worker.js").read_text(encoding="utf-8")
          wrangler_text = Path("cloudflare/workflow-scheduler/wrangler.toml").read_text(encoding="utf-8")

          worker_crons = re.findall(r'cron:\s*"([^"]+)"', worker_text)

          match = re.search(r'crons\s*=\s*\[(.*?)\]', wrangler_text, re.S)
          if not match:
              raise SystemExit("No [triggers].crons array found in wrangler.toml")
          wrangler_crons = re.findall(r'"([^"]+)"', match.group(1))

          if worker_crons != wrangler_crons:
              raise SystemExit(
                  "Scheduler cron mismatch between worker.js and wrangler.toml:\\n"
                  f"worker.js: {worker_crons}\\nwrangler.toml: {wrangler_crons}"
              )

          print(f"Cron alignment OK: {worker_crons}")
          PY

      - name: Deploy Worker (base)
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare/workflow-scheduler
          command: deploy --name ${{ env.UK_AQ_WORKFLOW_SCHEDULER_WORKER_NAME }}

      - name: Set Worker secrets
        working-directory: cloudflare/workflow-scheduler
        run: |
          set -euo pipefail
          secrets_json="$(jq -n \
            --arg GITHUB_WORKFLOW_DISPATCH_TOKEN "${UK_AQ_WORKFLOW_SCHEDULER_GITHUB_DISPATCH_TOKEN}" \
            --arg MANUAL_TRIGGER_KEY "${UK_AQ_WORKFLOW_SCHEDULER_MANUAL_TRIGGER_KEY}" \
            '{GITHUB_WORKFLOW_DISPATCH_TOKEN: $GITHUB_WORKFLOW_DISPATCH_TOKEN, MANUAL_TRIGGER_KEY: $MANUAL_TRIGGER_KEY} | with_entries(select(.value != ""))')"
          for attempt in 1 2 3; do
            if printf "%s" "$secrets_json" | npx --yes wrangler@4 secret bulk --name "${UK_AQ_WORKFLOW_SCHEDULER_WORKER_NAME}"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to apply Worker secrets after 3 attempts."
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare/workflow-scheduler
          command: deploy --name ${{ env.UK_AQ_WORKFLOW_SCHEDULER_WORKER_NAME }}
