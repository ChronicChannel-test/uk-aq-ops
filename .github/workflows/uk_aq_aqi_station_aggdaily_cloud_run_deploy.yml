name: Deploy AQI Station AggDaily Cloud Run Service

on:
  push:
    branches:
      - main
    paths:
      - "workers/uk_aq_aqi_station_aggdaily_cloud_run/**"
      - "scripts/gcp/uk_aq_secret_upsert_if_changed.sh"
      - ".github/workflows/uk_aq_aqi_station_aggdaily_cloud_run_deploy.yml"
  workflow_dispatch:

concurrency:
  group: uk-aq-aqi-station-aggdaily-deploy
  cancel-in-progress: false

jobs:
  deploy-aqi-station-aggdaily-service:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION || 'europe-west2' }}
      REPO: ${{ vars.GCP_ARTIFACT_REPO || 'uk-aq' }}
      SERVICE_NAME: ${{ vars.GCP_AQI_STATION_AGGDAILY_SERVICE_NAME || 'uk-aq-aqi-station-aggdaily' }}
      AQI_SERVICE_ACCOUNT: ${{ vars.GCP_AQI_STATION_AGGDAILY_SERVICE_ACCOUNT || vars.GCP_OPS_JOB_SERVICE_ACCOUNT || '' }}
      RESOURCE_LABEL: uk-aq-aqi-station-aggdaily-service
      SERVICE_TIMEOUT_SECONDS: ${{ vars.GCP_AQI_STATION_AGGDAILY_SERVICE_TIMEOUT_SECONDS || '900' }}
      SERVICE_CPU: ${{ vars.GCP_AQI_STATION_AGGDAILY_SERVICE_CPU || '1' }}
      SERVICE_MEMORY: ${{ vars.GCP_AQI_STATION_AGGDAILY_SERVICE_MEMORY || '1Gi' }}
      SERVICE_CONCURRENCY: ${{ vars.GCP_AQI_STATION_AGGDAILY_SERVICE_CONCURRENCY || '1' }}
      SERVICE_MAX_INSTANCES: ${{ vars.GCP_AQI_STATION_AGGDAILY_SERVICE_MAX_INSTANCES || '1' }}
      SERVICE_MIN_INSTANCES: ${{ vars.GCP_AQI_STATION_AGGDAILY_SERVICE_MIN_INSTANCES || '0' }}
      SCHEDULER_ENABLED: ${{ vars.GCP_AQI_STATION_AGGDAILY_SCHEDULER_ENABLED || 'false' }}
      SCHEDULER_SERVICE_ACCOUNT: ${{ vars.GCP_AQI_STATION_AGGDAILY_SCHEDULER_SERVICE_ACCOUNT || '' }}
      SCHEDULER_TIMEZONE: ${{ vars.GCP_AQI_STATION_AGGDAILY_SCHEDULER_TIMEZONE || 'Etc/UTC' }}
      SCHEDULER_MAX_RETRY_ATTEMPTS: ${{ vars.GCP_AQI_STATION_AGGDAILY_SCHEDULER_MAX_RETRY_ATTEMPTS || '0' }}
      SCHEDULER_FAST_JOB_NAME: ${{ vars.GCP_AQI_STATION_AGGDAILY_FAST_JOB_NAME || 'uk-aq-aqi-station-fast-5m' }}
      SCHEDULER_FAST_CRON: ${{ vars.GCP_AQI_STATION_AGGDAILY_FAST_CRON || '*/5 * * * *' }}
      SCHEDULER_SHORT_JOB_NAME: ${{ vars.GCP_AQI_STATION_AGGDAILY_SHORT_JOB_NAME || 'uk-aq-aqi-station-reconcile-2h' }}
      SCHEDULER_SHORT_CRON: ${{ vars.GCP_AQI_STATION_AGGDAILY_SHORT_CRON || '7 */2 * * *' }}
      SCHEDULER_DEEP_JOB_NAME: ${{ vars.GCP_AQI_STATION_AGGDAILY_DEEP_JOB_NAME || 'uk-aq-aqi-station-reconcile-deep-daily' }}
      SCHEDULER_DEEP_CRON: ${{ vars.GCP_AQI_STATION_AGGDAILY_DEEP_CRON || '17 3 * * *' }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      AGGDAILY_SUPABASE_URL: ${{ vars.AGGDAILY_SUPABASE_URL }}
      UK_AQ_PUBLIC_SCHEMA: ${{ vars.UK_AQ_PUBLIC_SCHEMA || 'uk_aq_public' }}
      UK_AQ_AQI_SOURCE_RPC: ${{ vars.UK_AQ_AQI_SOURCE_RPC || 'uk_aq_rpc_station_aqi_hourly_source' }}
      UK_AQ_AQI_BREAKPOINTS_RPC: ${{ vars.UK_AQ_AQI_BREAKPOINTS_RPC || 'uk_aq_rpc_aqi_breakpoints_active' }}
      UK_AQ_AQI_HOURLY_UPSERT_RPC: ${{ vars.UK_AQ_AQI_HOURLY_UPSERT_RPC || 'uk_aq_rpc_station_aqi_hourly_upsert' }}
      UK_AQ_AQI_ROLLUP_REFRESH_RPC: ${{ vars.UK_AQ_AQI_ROLLUP_REFRESH_RPC || 'uk_aq_rpc_station_aqi_rollups_refresh' }}
      UK_AQ_AQI_RUN_LOG_RPC: ${{ vars.UK_AQ_AQI_RUN_LOG_RPC || 'uk_aq_rpc_aqi_compute_run_log' }}
      UK_AQ_AQI_RUN_CLEANUP_RPC: ${{ vars.UK_AQ_AQI_RUN_CLEANUP_RPC || 'uk_aq_rpc_aqi_compute_runs_cleanup' }}
      UK_AQ_AQI_MATURITY_DELAY_HOURS: ${{ vars.UK_AQ_AQI_MATURITY_DELAY_HOURS || '3' }}
      UK_AQ_AQI_SHORT_LOOKBACK_HOURS: ${{ vars.UK_AQ_AQI_SHORT_LOOKBACK_HOURS || '36' }}
      UK_AQ_AQI_DEEP_LOOKBACK_DAYS: ${{ vars.UK_AQ_AQI_DEEP_LOOKBACK_DAYS || '14' }}
      UK_AQ_AQI_RPC_RETRIES: ${{ vars.UK_AQ_AQI_RPC_RETRIES || '3' }}
      UK_AQ_AQI_HOURLY_UPSERT_CHUNK_SIZE: ${{ vars.UK_AQ_AQI_HOURLY_UPSERT_CHUNK_SIZE || '2000' }}
      UK_AQ_AQI_RUN_LOG_RETENTION_DAYS: ${{ vars.UK_AQ_AQI_RUN_LOG_RETENTION_DAYS || '7' }}
      SB_SECRET_KEY: ${{ secrets.SB_SECRET_KEY }}
      AGGDAILY_SECRET_KEY: ${{ secrets.AGGDAILY_SECRET_KEY }}
      SB_SECRET_KEY_SECRET_NAME: ${{ vars.SB_SECRET_KEY_SECRET_NAME || 'SB_SECRET_KEY' }}
      AGGDAILY_SECRET_KEY_SECRET_NAME: ${{ vars.AGGDAILY_SECRET_KEY_SECRET_NAME || 'AGGDAILY_SECRET_KEY' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required project config
        run: |
          set -euo pipefail
          if [ -z "${PROJECT_ID:-}" ]; then
            echo "Missing required variable: GCP_PROJECT_ID"
            exit 1
          fi
          if [ -z "${AQI_SERVICE_ACCOUNT:-}" ]; then
            echo "Missing required service account setting: GCP_AQI_STATION_AGGDAILY_SERVICE_ACCOUNT (or GCP_OPS_JOB_SERVICE_ACCOUNT)"
            exit 1
          fi
          if [[ "${AQI_SERVICE_ACCOUNT}" == *"-compute@developer.gserviceaccount.com" ]]; then
            echo "Invalid runtime service account: default compute service account is not allowed."
            exit 1
          fi
          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "Missing required variable: SUPABASE_URL"
            exit 1
          fi
          if [ -z "${AGGDAILY_SUPABASE_URL:-}" ]; then
            echo "Missing required variable: AGGDAILY_SUPABASE_URL"
            exit 1
          fi

      - name: Validate Google auth config
        run: |
          set -euo pipefail
          if [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ] && [ -n "${GCP_SERVICE_ACCOUNT:-}" ]; then
            echo "Using Workload Identity Federation auth."
          elif [ -n "${GCP_SA_KEY:-}" ]; then
            echo "Using Service Account key auth."
          else
            echo "Missing Google auth config."
            echo "Set either:"
            echo "1) GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT"
            echo "or"
            echo "2) GCP_SA_KEY"
            exit 1
          fi

      - name: Authenticate to Google Cloud (WIF)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key fallback)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || env.GCP_SERVICE_ACCOUNT == '' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f

      - name: Configure gcloud project
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          gcloud config set run/region "${REGION}"

      - name: Verify Artifact Registry repository exists
        run: |
          set -euo pipefail
          gcloud artifacts repositories describe "${REPO}" \
            --location "${REGION}" \
            --project "${PROJECT_ID}" >/dev/null

      - name: Configure Docker auth for Artifact Registry
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push AQI image
        id: build
        run: |
          set -euo pipefail
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/uk-aq-aqi-station-aggdaily:${GITHUB_SHA::12}"
          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
          docker build -f workers/uk_aq_aqi_station_aggdaily_cloud_run/Dockerfile -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Sync GitHub secrets to GCP Secret Manager
        run: |
          set -euo pipefail
          UPSERT_SCRIPT="scripts/gcp/uk_aq_secret_upsert_if_changed.sh"

          upsert_secret() {
            local secret_name="$1"
            local secret_value="$2"
            local required="${3:-0}"

            if [ -z "${secret_name}" ]; then
              if [ "${required}" = "1" ]; then
                echo "Missing required secret name."
                exit 1
              fi
              return 0
            fi

            if [ -z "${secret_value}" ] && [ "${required}" = "0" ]; then
              echo "Skipping optional secret ${secret_name} (no GitHub secret/variable value)."
              return 0
            fi

            printf '%s' "${secret_value}" | "${UPSERT_SCRIPT}" \
              --project "${PROJECT_ID}" \
              --secret "${secret_name}" \
              --required "${required}"
          }

          upsert_secret "${SB_SECRET_KEY_SECRET_NAME}" "${SB_SECRET_KEY}" 1
          upsert_secret "${AGGDAILY_SECRET_KEY_SECRET_NAME}" "${AGGDAILY_SECRET_KEY}" 1

      - name: Build Cloud Run env and secret args
        id: cloudrun_args
        run: |
          set -euo pipefail

          require_env() {
            local key="$1"
            local value="${!key:-}"
            if [ -z "${value}" ]; then
              echo "Missing required value for ${key}"
              exit 1
            fi
          }

          add_env() {
            local key="$1"
            local value="${!key:-}"
            if [ -n "${value}" ]; then
              env_updates+=("${key}=${value}")
            fi
          }

          add_secret_binding() {
            local env_key="$1"
            local secret_name="$2"
            local required="${3:-0}"
            if [ -z "${secret_name}" ]; then
              if [ "${required}" = "1" ]; then
                echo "Missing secret name for required binding ${env_key}"
                exit 1
              fi
              return 0
            fi
            if gcloud secrets describe "${secret_name}" --project "${PROJECT_ID}" >/dev/null 2>&1; then
              secret_updates+=("${env_key}=${secret_name}:latest")
              return 0
            fi
            if [ "${required}" = "1" ]; then
              echo "Required Secret Manager secret not found: ${secret_name}"
              exit 1
            fi
          }

          require_env SUPABASE_URL
          require_env AGGDAILY_SUPABASE_URL

          env_updates=()
          add_env SUPABASE_URL
          add_env AGGDAILY_SUPABASE_URL
          add_env UK_AQ_PUBLIC_SCHEMA
          add_env UK_AQ_AQI_SOURCE_RPC
          add_env UK_AQ_AQI_BREAKPOINTS_RPC
          add_env UK_AQ_AQI_HOURLY_UPSERT_RPC
          add_env UK_AQ_AQI_ROLLUP_REFRESH_RPC
          add_env UK_AQ_AQI_RUN_LOG_RPC
          add_env UK_AQ_AQI_RUN_CLEANUP_RPC
          add_env UK_AQ_AQI_MATURITY_DELAY_HOURS
          add_env UK_AQ_AQI_SHORT_LOOKBACK_HOURS
          add_env UK_AQ_AQI_DEEP_LOOKBACK_DAYS
          add_env UK_AQ_AQI_RPC_RETRIES
          add_env UK_AQ_AQI_HOURLY_UPSERT_CHUNK_SIZE
          add_env UK_AQ_AQI_RUN_LOG_RETENTION_DAYS
          env_updates+=("GCP_PROJECT_ID=${PROJECT_ID}")

          secret_updates=()
          add_secret_binding "SB_SECRET_KEY" "${SB_SECRET_KEY_SECRET_NAME}" 1
          add_secret_binding "AGGDAILY_SECRET_KEY" "${AGGDAILY_SECRET_KEY_SECRET_NAME}" 1

          env_file="${RUNNER_TEMP}/uk-aq-aqi-station-aggdaily-env.yaml"
          : > "${env_file}"
          for kv in "${env_updates[@]}"; do
            key="${kv%%=*}"
            value="${kv#*=}"
            python3 -c 'import json,sys; f=open(sys.argv[1], "a", encoding="utf-8"); print(f"{sys.argv[2]}: {json.dumps(sys.argv[3])}", file=f); f.close()' \
              "${env_file}" "${key}" "${value}"
          done

          secret_csv="$(IFS=,; echo "${secret_updates[*]}")"
          echo "env_file=${env_file}" >> "${GITHUB_OUTPUT}"
          echo "secret_csv=${secret_csv}" >> "${GITHUB_OUTPUT}"

      - name: Deploy Cloud Run service
        run: |
          set -euo pipefail
          ENV_FILE='${{ steps.cloudrun_args.outputs.env_file }}'
          SECRET_CSV='${{ steps.cloudrun_args.outputs.secret_csv }}'

          CMD=(
            gcloud run deploy "${SERVICE_NAME}"
            --region "${REGION}"
            --image "${{ steps.build.outputs.image }}"
            --service-account "${AQI_SERVICE_ACCOUNT}"
            --timeout "${SERVICE_TIMEOUT_SECONDS}"
            --cpu "${SERVICE_CPU}"
            --memory "${SERVICE_MEMORY}"
            --concurrency "${SERVICE_CONCURRENCY}"
            --max-instances "${SERVICE_MAX_INSTANCES}"
            --min-instances "${SERVICE_MIN_INSTANCES}"
            --labels "job_name=${RESOURCE_LABEL}"
            --no-allow-unauthenticated
          )
          if [ -n "${ENV_FILE}" ]; then
            CMD+=(--env-vars-file "${ENV_FILE}")
          fi
          if [ -n "${SECRET_CSV}" ]; then
            CMD+=(--set-secrets "${SECRET_CSV}")
          fi
          "${CMD[@]}"

      - name: Verify service labels
        run: |
          set -euo pipefail
          labels_json="$(gcloud run services describe "${SERVICE_NAME}" --region "${REGION}" --format="json(metadata.labels)")"
          job_name_label="$(
            python3 -c 'import json,sys; print(((json.loads(sys.stdin.read()) or {}).get("metadata", {}) or {}).get("labels", {}).get("job_name", ""))' <<<"${labels_json}"
          )"
          if [ "${job_name_label}" != "${RESOURCE_LABEL}" ]; then
            echo "job_name label mismatch: expected ${RESOURCE_LABEL}, got ${job_name_label:-<missing>}"
            exit 1
          fi
          echo "Verified label job_name=${job_name_label}"

      - name: Ensure Cloud Scheduler triggers exist
        run: |
          set -euo pipefail

          enabled="$(printf '%s' "${SCHEDULER_ENABLED}" | tr '[:upper:]' '[:lower:]')"

          maybe_pause() {
            local job_name="$1"
            if gcloud scheduler jobs describe "${job_name}" --location "${REGION}" >/dev/null 2>&1; then
              gcloud scheduler jobs pause "${job_name}" --location "${REGION}" || true
              echo "Paused existing scheduler job ${job_name}."
            fi
          }

          if [ "${enabled}" != "true" ] && [ "${enabled}" != "1" ] && [ "${enabled}" != "yes" ]; then
            maybe_pause "${SCHEDULER_FAST_JOB_NAME}"
            maybe_pause "${SCHEDULER_SHORT_JOB_NAME}"
            maybe_pause "${SCHEDULER_DEEP_JOB_NAME}"
            echo "Scheduler disabled (SCHEDULER_ENABLED=${SCHEDULER_ENABLED})."
            exit 0
          fi

          scheduler_sa="${SCHEDULER_SERVICE_ACCOUNT:-${AQI_SERVICE_ACCOUNT}}"
          service_uri="$(gcloud run services describe "${SERVICE_NAME}" --region "${REGION}" --format='value(status.url)')"

          gcloud run services add-iam-policy-binding "${SERVICE_NAME}" \
            --region "${REGION}" \
            --member "serviceAccount:${scheduler_sa}" \
            --role "roles/run.invoker" >/dev/null

          ensure_job() {
            local job_name="$1"
            local cron="$2"
            local body="$3"

            if gcloud scheduler jobs describe "${job_name}" --location "${REGION}" >/dev/null 2>&1; then
              gcloud scheduler jobs update http "${job_name}" \
                --location "${REGION}" \
                --schedule "${cron}" \
                --time-zone "${SCHEDULER_TIMEZONE}" \
                --uri "${service_uri}" \
                --http-method POST \
                --update-headers "Content-Type=application/json" \
                --message-body "${body}" \
                --oidc-service-account-email "${scheduler_sa}" \
                --oidc-token-audience "${service_uri}" \
                --max-retry-attempts "${SCHEDULER_MAX_RETRY_ATTEMPTS}"
              echo "Updated Cloud Scheduler job: ${job_name}"
            else
              gcloud scheduler jobs create http "${job_name}" \
                --location "${REGION}" \
                --schedule "${cron}" \
                --time-zone "${SCHEDULER_TIMEZONE}" \
                --uri "${service_uri}" \
                --http-method POST \
                --headers "Content-Type=application/json" \
                --message-body "${body}" \
                --oidc-service-account-email "${scheduler_sa}" \
                --oidc-token-audience "${service_uri}" \
                --max-retry-attempts "${SCHEDULER_MAX_RETRY_ATTEMPTS}"
              echo "Created Cloud Scheduler job: ${job_name}"
            fi
          }

          ensure_job "${SCHEDULER_FAST_JOB_NAME}" "${SCHEDULER_FAST_CRON}" '{"trigger_mode":"scheduler","run_mode":"fast"}'
          ensure_job "${SCHEDULER_SHORT_JOB_NAME}" "${SCHEDULER_SHORT_CRON}" '{"trigger_mode":"scheduler","run_mode":"reconcile_short"}'
          ensure_job "${SCHEDULER_DEEP_JOB_NAME}" "${SCHEDULER_DEEP_CRON}" '{"trigger_mode":"scheduler","run_mode":"reconcile_deep"}'

      - name: Show deployed service
        run: |
          gcloud run services describe "${SERVICE_NAME}" \
            --region "${REGION}" \
            --format="yaml(metadata.name,metadata.labels,spec.template.spec.serviceAccountName,spec.template.spec.containerConcurrency,spec.template.spec.containers[0].image,spec.template.spec.containers[0].resources,status.url)"
